# FortiCNAPP AWS Inventory API — Kubernetes Deployment
#
# IRSA (IAM Roles for Service Accounts) is the recommended approach on EKS.
# To use IRSA instead of the aws-credentials Secret:
#   1. Create an IAM role with the required permissions and an OIDC trust policy.
#   2. Create a Kubernetes ServiceAccount annotated with the IAM role ARN:
#        kubectl create serviceaccount forticnapp-inventory
#        kubectl annotate serviceaccount forticnapp-inventory \
#          eks.amazonaws.com/role-arn=arn:aws:iam::ACCOUNT_ID:role/forticnapp-inventory-task-role
#   3. Set spec.serviceAccountName: forticnapp-inventory below.
#   4. Remove the envFrom block referencing aws-credentials.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: forticnapp-aws-inventory
  namespace: default
  labels:
    app: forticnapp-aws-inventory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forticnapp-aws-inventory
  template:
    metadata:
      labels:
        app: forticnapp-aws-inventory
    spec:
      # Uncomment and set when using IRSA:
      # serviceAccountName: forticnapp-inventory

      # lacework-iac-k8s-security-1: pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: forticnapp-aws-inventory
          # Pin to a specific image digest — replace :latest with a versioned tag or digest
          # e.g. ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/forticnapp-aws-inventory:1.0.0
          image: ACCOUNT_ID.dkr.ecr.REGION.amazonaws.com/forticnapp-aws-inventory:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: aws-credentials

          # lacework-iac-k8s-security-1: container-level security context
          # lacework-iac-k8s-security-2: allowPrivilegeEscalation=false
          # lacework-iac-k8s-workload-3: drop NET_RAW capability
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - NET_RAW
                - ALL

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
