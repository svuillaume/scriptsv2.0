# AWS credentials secret for FortiCNAPP AWS Inventory API
#
# IMPORTANT: In production on EKS, prefer IRSA (IAM Roles for Service Accounts)
# instead of static credentials stored here.
# See: https://docs.aws.amazon.com/eks/latest/userguide/iam-roles-for-service-accounts.html
#
# To base64-encode a value:
#   echo -n "MYVALUE" | base64
#
# Replace REPLACE_BASE64 below with the base64-encoded values of your credentials.

apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials
  namespace: default
type: Opaque
data:
  AWS_ACCESS_KEY_ID: REPLACE_BASE64
  AWS_SECRET_ACCESS_KEY: REPLACE_BASE64
  # dXMtZWFzdC0x = us-east-1 (base64)
  AWS_DEFAULT_REGION: dXMtZWFzdC0x
